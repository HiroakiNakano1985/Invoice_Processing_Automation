<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Login – Invoice Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0b1224; --panel:#121e3f; --text:#e6edf7; --muted:#9fb3d6;
      --primary:#2563eb; --border:#1b2a56; --danger:#ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg, #0b1224 0%, #0e1730 100%);
      font-family: 'Inter', system-ui, sans-serif; color: var(--text);
    }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px; width: 100%; max-width: 360px;
      box-shadow: 0 12px 30px rgba(0,16,61,0.35);
    }
    .logo {
      width: 40px; height: 40px; border-radius: 10px; margin: 0 auto 16px;
      background: radial-gradient(circle at 30% 30%, #4ea1ff 0, #2563eb 60%, #0b1224 100%);
      box-shadow: 0 10px 24px rgba(37,99,235,.4);
    }
    h1 { text-align: center; font-size: 1.2rem; margin-bottom: 24px; }
    label { display: block; font-size: .85rem; color: var(--muted); margin-bottom: 6px; }
    input[type="password"] {
      width: 100%; padding: 10px 12px; border-radius: 10px;
      border: 1px solid var(--border); background: #0f1a36;
      color: var(--text); font-size: 1rem; outline: none;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: var(--primary); }
    button {
      width: 100%; padding: 10px; border-radius: 10px; border: none;
      background: linear-gradient(180deg, #2a54ad, #1f3f85);
      color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    button:hover { opacity: .9; }
    .error { color: var(--danger); font-size: .85rem; margin-bottom: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"></div>
    <h1>Invoice Dashboard</h1>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus placeholder="Enter password" />
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
